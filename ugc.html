  <h2 class="page-title">UGC 持妆照片流</h2>

    <input type="file" id="fileInput" accept="image/*" style="display:none;">
    <button class="btn" onclick="document.getElementById('fileInput').click()">上传持妆照片 + 兰纳积分</button>
  </div>
  <div class="masonry" id="masonry">

<script src="common.js"></script>
<script>
// 上传照片并加入瀑布流
document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);
  
  // 新建图片
  const img = document.createElement('img');
  img.src = url;
  
  // 新建说明文字
  const p = document.createElement('p');
  p.innerText = "用户实拍 · 持妆效果展示";

  // 加入瀑布流
  document.getElementById('masonry').appendChild(img);
  document.getElementById('masonry').appendChild(p);

  alert("上传成功！+50兰纳积分");
});
</script>
